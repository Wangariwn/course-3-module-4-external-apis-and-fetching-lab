<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Alerts App</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h1>Weather Alerts App</h1>
  <div class="controls">
    <label for="state-input">U.S. state abbreviation</label>
    <input
      type="text"
      id="state-input"
      placeholder="Enter state abbreviation"
      autocomplete="off"
      inputmode="text"
      maxlength="2"
      aria-describedby="help-text"
    >
    <p id="help-text" class="help-text">Example: <strong>CA</strong>, <strong>NY</strong>, <strong>TX</strong></p>
    <button type="button" id="fetch-alerts">Get Weather Alerts</button>
  </div>
  <div id="loading-spinner" class="hidden" role="status" aria-live="polite">
    Loading alerts…
  </div>
  <div id="alerts-display" aria-live="polite"></div>
  <div id="error-message" class="hidden" role="alert" aria-live="assertive"></div>
  <script src="./index.js"></script>
</body>
</html>
